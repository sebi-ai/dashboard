<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
        <div id="site-notification" class="site-notification">
        <span class="site-notification__text"></span>
    </div>
    <div id="head">
        <div id="settings-menu">
            <button class="btn" id="settings-trigger">☰</button>
        <div id="settings-dropdown">
            <img src="favicon.png" id="menu-logo" alt="Logo" width="48" height="48">
            <button class="btn menu-btn" id="home-btn">Home</button>
            <button id="redirect-start-btn" class="btn menu-btn">Open Dashboard</button>
            <button class="btn menu-btn" id="settings-btn">Settings</button>
            <button class="btn menu-btn" id="about-btn">About me</button>
        </div>
    </div>
    <div id="start-dashboard">
        <h1>Start dashboard</h1>
        <p>Start your dashboard by pressing this button. <br>
        If you want to change any settings, go into the menu and press Settings.</p>
        <button id="start-btn" class="btn">Start Dashboard</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
